<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Decision Simulator</title>

    <!-- Bootstrap for good-looking UI -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .container-box {
            max-width: 800px;
            margin: auto;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }

        #result {
            font-size: 22px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<div class="container mt-5 container-box">

    <h1>🧠 AI Decision Simulator</h1>

    <!-- 1. Upload Dataset -->
    <div class="card p-4">
        <h4>1. Upload Dataset</h4>
        <input type="file" id="fileInput" class="form-control mt-2">
        <button class="btn btn-primary mt-3 w-100" onclick="uploadFile()">Upload Dataset</button>
    </div>

    <!-- 2. Train Model -->
    <div class="card p-4">
        <h4>2. Train Model</h4>
        <input type="text" id="target" class="form-control mt-2" placeholder="Enter target column (e.g. sales)">
        <button class="btn btn-warning mt-3 w-100" onclick="trainModel()">Train Model</button>
    </div>

    <!-- 3. What-If Simulation -->
    <div class="card p-4">
        <h4>3. What-If Simulation 🔮</h4>

        <input type="number" id="feature1" class="form-control mt-2" placeholder="Feature 1 (e.g. price)">
        <input type="number" id="feature2" class="form-control mt-2" placeholder="Feature 2 (e.g. marketing)">

        <button class="btn btn-success mt-3 w-100" onclick="simulate()">Run Simulation</button>

        <hr>

        <h5>Prediction Result:</h5>
        <div id="result">Waiting for input...</div>
    </div>

</div>

<!-- JavaScript -->
<script>
    // Upload dataset
    function uploadFile() {
        let file = document.getElementById("fileInput").files[0];

        let formData = new FormData();
        formData.append("file", file);

        fetch("/upload", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            alert("Dataset uploaded successfully!");
            console.log(data);
        });
    }

    // Train model
    function trainModel() {
        let target = document.getElementById("target").value;

        fetch("/train", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ target: target })
        })
        .then(res => res.json())
        .then(data => {
            alert("Model trained successfully!");
            console.log(data);
        });
    }

    // What-if simulation
    function simulate() {
        let f1 = document.getElementById("feature1").value;
        let f2 = document.getElementById("feature2").value;

        fetch("/simulate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                input: {
                    feature1: parseFloat(f1),
                    feature2: parseFloat(f2)
                }
            })
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerHTML =
                "📊 Predicted Value: " + data.prediction.toFixed(2);
        });
    }
</script>

</body>
</html>
